<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>清洁模式 - 屏幕 / 键盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #blackScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 9999;
        }

        #hint {
            color: #555555;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            font-size: 24px;
            pointer-events: none;
            transition: opacity 1.5s ease;
            opacity: 1;
            text-align: center;
            padding: 20px;
            line-height: 1.8;
        }

        #hint small {
            display: block;
            font-size: 14px;
            color: #333333;
            margin-top: 8px;
        }

        #hint.hidden {
            opacity: 0;
        }

                #exitHint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #555555;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            font-size: 14px;
            pointer-events: none;
            transition: opacity 0.5s ease;
            opacity: 0;
            z-index: 10000;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
        }

        #exitHint.show {
            opacity: 1;
        }

        #winWarning {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #444444;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            font-size: 12px;
            pointer-events: none;
            transition: opacity 1.5s ease;
            opacity: 0;
            z-index: 10000;
            text-align: center;
            line-height: 1.6;
            white-space: nowrap;
        }

        #winWarning.show {
            opacity: 1;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
        <div id="blackScreen">
        <div id="hint">
            点击任意位置开始清洁
            <small>屏幕 / 键盘 清洁模式</small>
        </div>
        <div id="exitHint">双击退出清洁模式</div>
        <div id="winWarning">💡 Win 键无法被屏蔽 · 如需彻底锁定键盘请拔掉键盘再清洁</div>
    </div>

    <script>
        (function() {
                        const blackScreen = document.getElementById('blackScreen');
            const hint = document.getElementById('hint');
            const exitHint = document.getElementById('exitHint');
            const winWarning = document.getElementById('winWarning');

            let isCleanMode = false;
            let cleanTimer = null;
            let wakeLock = null;

            // ====== 屏幕常亮 ======
            async function requestWakeLock() {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLock = await navigator.wakeLock.request('screen');
                    }
                } catch (err) {}
            }

            function releaseWakeLock() {
                if (wakeLock) {
                    wakeLock.release().catch(() => {});
                    wakeLock = null;
                }
            }

            // ====== 键盘事件拦截（清洁键盘时防止误触） ======
            function blockKeys(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }

            function enableKeyboardBlock() {
                document.addEventListener('keydown', blockKeys, true);
                document.addEventListener('keyup', blockKeys, true);
                document.addEventListener('keypress', blockKeys, true);
            }

            function disableKeyboardBlock() {
                document.removeEventListener('keydown', blockKeys, true);
                document.removeEventListener('keyup', blockKeys, true);
                document.removeEventListener('keypress', blockKeys, true);
            }

            // ====== 全屏 ======
            function requestFullscreen() {
                const el = document.documentElement;
                if (el.requestFullscreen) {
                    el.requestFullscreen();
                } else if (el.webkitRequestFullscreen) {
                    el.webkitRequestFullscreen();
                } else if (el.msRequestFullscreen) {
                    el.msRequestFullscreen();
                }
            }

            function exitFullscreen() {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else if (document.webkitFullscreenElement) {
                    document.webkitExitFullscreen();
                } else if (document.msFullscreenElement) {
                    document.msExitFullscreen();
                }
            }

            // ====== 进入清洁模式 ======
            function enterCleanMode() {
                isCleanMode = true;
                hint.classList.add('hidden');

                                setTimeout(() => {
                    exitHint.textContent = '双击退出清洁模式';
                    exitHint.classList.add('show');
                    winWarning.classList.add('show');
                }, 500);

                requestWakeLock();
                requestFullscreen();
                enableKeyboardBlock();

                clearTimeout(cleanTimer);
                cleanTimer = setTimeout(() => {
                    exitHint.classList.remove('show');
                    winWarning.classList.remove('show');
                }, 4000);
            }

                        // ====== 退出清洁模式 ======
            function exitCleanMode() {
                isCleanMode = false;
                releaseWakeLock();
                disableKeyboardBlock();
                exitFullscreen();

                                hint.classList.remove('hidden');
                exitHint.classList.remove('show');
                winWarning.classList.remove('show');
                hint.innerHTML = '点击任意位置开始清洁<small>屏幕 / 键盘 清洁模式</small>';
            }

            // ====== 事件绑定 ======
            // 单击：未清洁时进入；清洁中忽略（防误触）
            blackScreen.addEventListener('click', function() {
                if (!isCleanMode) {
                    enterCleanMode();
                }
            });

            // 双击：退出清洁模式
            blackScreen.addEventListener('dblclick', function() {
                if (isCleanMode) {
                    exitCleanMode();
                }
            });

            // 阻止右键菜单
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });

            console.log('清洁模式已启动 ✓  单击进入 · 双击退出');
        })();
    </script>
</body>
</html>
